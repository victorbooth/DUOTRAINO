<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUOTRAINO - Learn Git</title>
    <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
    <div id="app">
        <!-- Profile Selection Screen -->
        <div id="profile-screen" class="screen active">
            <div class="logo-header">
                <h1>🤖 DUOTRAINO</h1>
                <p>Learn Git the fun way!</p>
            </div>
            <div class="profile-container">
                <h2>Select Your Profile</h2>
                <div id="profile-list" class="profile-list"></div>
                <button id="new-profile-btn" class="btn-primary">+ New Profile</button>
            </div>
        </div>

        <!-- Home/Level Map Screen -->
        <div id="home-screen" class="screen">
            <header class="main-header">
                <div class="header-left">
                    <span class="logo">🤖 DUOTRAINO</span>
                </div>
                <div class="header-stats">
                    <span class="stat gems">💎 <span id="gem-count">0</span></span>
                </div>
            </header>
            
            <main class="level-map">
                <div id="levels-container"></div>
            </main>
            
            <nav class="bottom-nav">
                <button class="nav-item active" data-screen="home">🏠 Home</button>
                <button class="nav-item" data-screen="profile">👤 Profile</button>
            </nav>
        </div>

        <!-- Lesson Screen -->
        <div id="lesson-screen" class="screen">
            <header class="lesson-header">
                <button id="close-lesson" class="close-btn">✕</button>
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <div class="lesson-stats">
                    <span>💎 <span id="lesson-gems">0</span></span>
                </div>
            </header>
            
            <main class="lesson-content">
                <div id="question-container"></div>
                
                <!-- Inline Feedback Area -->
                <div id="feedback-area" class="feedback-area hidden"></div>
                
                <!-- Action Buttons Footer -->
                <footer class="quiz-footer">
                    <button id="check-btn" class="btn-check hidden">Check</button>
                    <button id="continue-btn" class="btn-continue hidden">Continue</button>
                </footer>
            </main>
        </div>

        <!-- Level Complete Screen -->
        <div id="complete-screen" class="screen">
            <div class="complete-content">
                <div class="trophy">🏆</div>
                <h2>Level Complete!</h2>
                <p id="complete-message">Great job!</p>
                <div class="rewards">
                    <div class="reward-item">
                        <span class="reward-icon">💎</span>
                        <span id="gems-earned">0</span>
                    </div>
                </div>
                <button id="next-level-btn" class="btn-primary">Continue</button>
                <button id="home-from-complete" class="btn-secondary">Back to Map</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=3"></script>
</body>
</html>
